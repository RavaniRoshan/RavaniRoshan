<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project preview cards</title>
  <desc id="desc">README-safe SVG project previews for Backstop, Nikki, and Phantom.</desc>
  <defs>
    <linearGradient id="card1" x1="0" y1="0" x2="310" y2="230"><stop stop-color="#21113f"/><stop offset="1" stop-color="#101827"/></linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="310" y2="230"><stop stop-color="#062837"/><stop offset="1" stop-color="#101827"/></linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="310" y2="230"><stop stop-color="#062b1b"/><stop offset="1" stop-color="#101827"/></linearGradient>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .float1 { animation: float 5s ease-in-out infinite; }
      .float2 { animation: float 5s ease-in-out infinite .45s; }
      .float3 { animation: float 5s ease-in-out infinite .9s; }
      .blink { animation: blink 1.4s steps(1) infinite; }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: .22; } }
      @media (prefers-reduced-motion: reduce) { .float1, .float2, .float3, .blink { animation: none; } }
    </style>
  </defs>
  <rect width="1000" height="360" rx="26" fill="#070914"/>
  <text x="500" y="48" text-anchor="middle" class="sans" font-size="28" font-weight="800" fill="#fff">Current Lab Bench</text>
  <text x="500" y="76" text-anchor="middle" class="mono" font-size="15" fill="#9ca3af">hover-card energy, but README-safe — no React gremlins required</text>

  <g class="float1" transform="translate(45 110)">
    <rect width="280" height="205" rx="24" fill="url(#card1)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="24" y="46" class="sans" font-size="30" font-weight="900" fill="#fff">🛡️ Backstop</text>
    <text x="24" y="84" class="mono" font-size="14" fill="#c4b5fd">budgets • retries • circuits</text>
    <rect x="24" y="106" width="232" height="12" rx="6" fill="#a78bfa" opacity=".35"/>
    <rect x="24" y="130" width="184" height="12" rx="6" fill="#a78bfa" opacity=".24"/>
    <rect x="24" y="162" width="92" height="26" rx="13" fill="#8b5cf6" opacity=".9"/>
    <text x="42" y="180" class="mono" font-size="12" fill="#fff">Python</text>
  </g>

  <g class="float2" transform="translate(360 110)">
    <rect width="280" height="205" rx="24" fill="url(#card2)" stroke="#06b6d4" stroke-width="2"/>
    <text x="24" y="46" class="sans" font-size="30" font-weight="900" fill="#fff">🤖 Nikki</text>
    <text x="24" y="84" class="mono" font-size="14" fill="#67e8f9">agents • docker • branches</text>
    <rect x="24" y="106" width="232" height="12" rx="6" fill="#67e8f9" opacity=".35"/>
    <rect x="24" y="130" width="202" height="12" rx="6" fill="#67e8f9" opacity=".24"/>
    <rect x="24" y="162" width="78" height="26" rx="13" fill="#0891b2" opacity=".95"/>
    <text x="44" y="180" class="mono" font-size="12" fill="#fff">Rust</text>
  </g>

  <g class="float3" transform="translate(675 110)">
    <rect width="280" height="205" rx="24" fill="url(#card3)" stroke="#22c55e" stroke-width="2"/>
    <text x="24" y="46" class="sans" font-size="30" font-weight="900" fill="#fff">👻 Phantom</text>
    <text x="24" y="84" class="mono" font-size="14" fill="#86efac">windows • background agent</text>
    <rect x="24" y="106" width="232" height="12" rx="6" fill="#86efac" opacity=".35"/>
    <rect x="24" y="130" width="170" height="12" rx="6" fill="#86efac" opacity=".24"/>
    <text x="24" y="181" class="mono blink" font-size="15" fill="#86efac">running quietly_</text>
  </g>
</svg>
