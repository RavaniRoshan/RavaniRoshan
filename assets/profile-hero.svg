<svg width="1000" height="280" viewBox="0 0 1000 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ravani Roshan animated profile hero</title>
  <desc id="desc">A README-safe SVG hero inspired by letter-swap motion with project pills for Backstop, Nikki, and Phantom.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09090f"/>
      <stop offset="0.48" stop-color="#171138"/>
      <stop offset="1" stop-color="#061a2d"/>
    </linearGradient>
    <linearGradient id="glow" x1="170" y1="20" x2="880" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.45 0 1 0 0 0.2 0 0 1 0 1 0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 900; letter-spacing: -2px; }
      .swap { animation: swap 5s ease-in-out infinite; }
      .swap2 { animation: swap2 5s ease-in-out infinite; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .scan { animation: scan 4.5s linear infinite; }
      @keyframes swap { 0%, 20%, 100% { transform: translateY(0); opacity: 1; } 35%, 55% { transform: translateY(-18px); opacity: .18; } 70%, 90% { transform: translateY(0); opacity: 1; } }
      @keyframes swap2 { 0%, 30%, 100% { transform: translateY(20px); opacity: .16; } 45%, 62% { transform: translateY(0); opacity: 1; } }
      @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: .9; } }
      @keyframes scan { from { transform: translateX(-260px); } to { transform: translateX(1040px); } }
      @media (prefers-reduced-motion: reduce) { .swap, .swap2, .pulse, .scan { animation: none; } }
    </style>
  </defs>

  <rect width="1000" height="280" rx="28" fill="url(#bg)"/>
  <rect x="2" y="2" width="996" height="276" rx="26" stroke="url(#glow)" stroke-width="4" opacity="0.7"/>
  <circle cx="155" cy="35" r="110" fill="#8b5cf6" opacity="0.16" filter="url(#softGlow)"/>
  <circle cx="850" cy="245" r="130" fill="#06b6d4" opacity="0.14" filter="url(#softGlow)"/>

  <g opacity="0.16" class="mono">
    <text x="46" y="55" font-size="15" fill="#d8b4fe">agent.status = awake</text>
    <text x="780" y="55" font-size="15" fill="#93c5fd">coffee.level = illegal</text>
    <text x="45" y="242" font-size="15" fill="#86efac">ship(&quot;useful systems&quot;)</text>
    <text x="735" y="242" font-size="15" fill="#f0abfc">bugs.evictionNotice()</text>
  </g>

  <g class="scan" opacity="0.35">
    <rect x="0" y="0" width="180" height="280" fill="url(#glow)" opacity="0.16"/>
  </g>

  <text x="500" y="93" text-anchor="middle" class="title swap" font-size="66" fill="#ffffff">Ravani Roshan</text>
  <text x="500" y="93" text-anchor="middle" class="title swap2" font-size="66" fill="#67e8f9">AI Systems Builder</text>
  <text x="500" y="128" text-anchor="middle" class="mono" font-size="18" fill="#c4b5fd">agent reliability • hermetic sandboxes • computer-use automation</text>

  <g transform="translate(205 166)">
    <rect width="174" height="46" rx="23" fill="#111827" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="28" cy="23" r="8" fill="#a78bfa" class="pulse"/>
    <text x="50" y="29" class="mono" font-size="18" font-weight="700" fill="#ffffff">Backstop</text>
  </g>
  <g transform="translate(413 166)">
    <rect width="174" height="46" rx="23" fill="#111827" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="28" cy="23" r="8" fill="#67e8f9" class="pulse"/>
    <text x="50" y="29" class="mono" font-size="18" font-weight="700" fill="#ffffff">Nikki</text>
  </g>
  <g transform="translate(621 166)">
    <rect width="174" height="46" rx="23" fill="#111827" stroke="#22c55e" stroke-width="2"/>
    <circle cx="28" cy="23" r="8" fill="#86efac" class="pulse"/>
    <text x="50" y="29" class="mono" font-size="18" font-weight="700" fill="#ffffff">Phantom</text>
  </g>
</svg>
